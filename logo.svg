<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="mainGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#38bdf8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0ea5e9;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="shadowGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0284c7;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0369a1;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- ── Main head shape ── -->
  <path
    d="M 55 155
       C 35 155, 25 130, 28 105
       C 30 85,  38 70,  50 58
       C 60 48,  72 38,  88 32
       C 102 26, 118 24, 132 28
       C 148 32, 160 42, 165 58
       C 170 72, 168 90, 160 105
       C 152 120, 138 132, 122 140
       C 108 148, 90 155, 72 156
       Z"
    fill="url(#mainGrad)"
  />

  <!-- ── Shadow / depth layer on left side ── -->
  <path
    d="M 55 155
       C 40 150, 28 135, 28 115
       C 28 95,  36 78,  48 65
       C 55 57,  64 50,  75 44
       C 68 55,  62 68,  58 82
       C 54 96,  52 112, 54 128
       C 55 138, 56 148, 58 155
       Z"
    fill="url(#shadowGrad)"
    opacity="0.6"
  />

  <!-- ── Ear left ── -->
  <path
    d="M 72 38 C 65 22, 52 15, 45 20 C 40 24, 44 38, 52 46 Z"
    fill="url(#mainGrad)"
  />

  <!-- ── Ear right ── -->
  <path
    d="M 118 30 C 122 14, 136 10, 142 16 C 147 22, 140 36, 130 42 Z"
    fill="url(#mainGrad)"
  />

  <!-- ── Inner ear left ── -->
  <path
    d="M 70 36 C 65 25, 56 20, 52 24 C 49 27, 52 37, 58 43 Z"
    fill="#0369a1"
    opacity="0.5"
  />

  <!-- ── Inner ear right ── -->
  <path
    d="M 120 29 C 124 18, 133 15, 138 20 C 141 24, 136 33, 128 39 Z"
    fill="#0369a1"
    opacity="0.5"
  />

  <!-- ── Muzzle / snout area ── -->
  <ellipse cx="138" cy="118" rx="22" ry="18" fill="#7dd3fc" opacity="0.5"/>

  <!-- ── Nose ── -->
  <ellipse cx="148" cy="110" rx="6" ry="4" fill="#0c4a6e"/>

  <!-- ── Mouth curl ── -->
  <path
    d="M 138 118 Q 148 128, 155 122"
    stroke="#0c4a6e" stroke-width="3" fill="none" stroke-linecap="round"
  />

  <!-- ── Left eye ── -->
  <ellipse cx="95" cy="72" rx="10" ry="8" fill="#0c4a6e"/>
  <ellipse cx="97" cy="70" rx="3" ry="3" fill="#38bdf8" opacity="0.4"/>

  <!-- ── Right eye ── -->
  <ellipse cx="135" cy="68" rx="10" ry="8" fill="#0c4a6e"/>
  <ellipse cx="137" cy="66" rx="3" ry="3" fill="#38bdf8" opacity="0.4"/>

  <!-- ── Cheetah spots ── -->
  <circle cx="72" cy="100" r="7" fill="#0369a1" opacity="0.7"/>
  <circle cx="88" cy="118" r="5" fill="#0369a1" opacity="0.7"/>
  <circle cx="68" cy="120" r="4" fill="#0369a1" opacity="0.6"/>
  <circle cx="82" cy="135" r="6" fill="#0369a1" opacity="0.65"/>
  <circle cx="100" cy="130" r="4" fill="#0369a1" opacity="0.55"/>
  <circle cx="60" cy="88"  r="5" fill="#0369a1" opacity="0.5"/>

  <!-- ── Tear marks (cheetah characteristic) ── -->
  <path d="M 95 80 Q 90 95, 88 108" stroke="#0369a1" stroke-width="2.5" fill="none" stroke-linecap="round" opacity="0.6"/>
  <path d="M 135 76 Q 142 90, 143 103" stroke="#0369a1" stroke-width="2.5" fill="none" stroke-linecap="round" opacity="0.6"/>
</svg>
